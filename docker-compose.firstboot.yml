name: vecta-kms-firstboot

services:
  firstboot:
    restart: unless-stopped
    platform: ${FIRSTBOOT_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: services/firstboot/Dockerfile
    image: vecta/firstboot:latest
    environment:
      FIRSTBOOT_PORT: "${FIRSTBOOT_PORT:-9443}"
      FIRSTBOOT_DEPLOYMENT_PATH: "${FIRSTBOOT_DEPLOYMENT_PATH:-/config/deployment.yaml}"
      FIRSTBOOT_NETWORK_PATH: "${FIRSTBOOT_NETWORK_PATH:-/config/network.yaml}"
      FIRSTBOOT_FIPS_PATH: "${FIRSTBOOT_FIPS_PATH:-/config/fips.yaml}"
      FIRSTBOOT_FDE_PATH: "${FIRSTBOOT_FDE_PATH:-/config/fde.yaml}"
      FIRSTBOOT_AUTH_PATH: "${FIRSTBOOT_AUTH_PATH:-/config/auth-bootstrap.yaml}"
      FIRSTBOOT_CERT_BOOTSTRAP_PATH: "${FIRSTBOOT_CERT_BOOTSTRAP_PATH:-/config/certs-bootstrap.secret}"
      FIRSTBOOT_PROJECT_ROOT: "${FIRSTBOOT_PROJECT_ROOT:-/opt/vecta}"
      FIRSTBOOT_RUNTIME_APPLY_ENABLED: "${FIRSTBOOT_RUNTIME_APPLY_ENABLED:-true}"
      FIRSTBOOT_REDIRECT_DELAY_SECONDS: "${FIRSTBOOT_REDIRECT_DELAY_SECONDS:-6}"
      FIRSTBOOT_SELF_CLEANUP_DELAY_SECONDS: "${FIRSTBOOT_SELF_CLEANUP_DELAY_SECONDS:-20}"
    ports:
      - "${FIRSTBOOT_PORT:-9443}:9443"
    volumes:
      - ${FIRSTBOOT_CONFIG_DIR:-./infra/deployment}:/config
      - ${FIRSTBOOT_PROJECT_ROOT:-.}:${FIRSTBOOT_PROJECT_ROOT:-/opt/vecta}:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9443/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kms_net

networks:
  kms_net:
    driver: bridge
