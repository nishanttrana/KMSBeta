# OpenSSL configuration to use the Vecta PKCS#11 provider via pkcs11 engine.
#
# Usage: OPENSSL_CONF=./04-openssl-engine.conf openssl ...
#
# Prerequisites:
#   - libvecta-pkcs11.so built and accessible
#   - libp11 (pkcs11 engine for OpenSSL) installed
#   - Environment variables set: VECTA_BASE_URL, VECTA_TENANT_ID, VECTA_AUTH_TOKEN

openssl_conf = openssl_init

[openssl_init]
engines = engine_section

[engine_section]
pkcs11 = pkcs11_section

[pkcs11_section]
engine_id = pkcs11
dynamic_path = /usr/lib/x86_64-linux-gnu/engines-3/pkcs11.so
MODULE_PATH = /opt/vecta/lib/libvecta-pkcs11.so
init = 0
