syntax = "proto3";

package vecta.pqc.v1;

option go_package = "vecta-kms/proto/pqc;pqcpb";

service PqcService {
  rpc StartReadinessScan (StartReadinessScanRequest) returns (StartReadinessScanResponse);
  rpc ListReadinessScans (ListReadinessScansRequest) returns (ListReadinessScansResponse);
  rpc GetReadinessScan (GetReadinessScanRequest) returns (GetReadinessScanResponse);
  rpc GetLatestReadiness (GetLatestReadinessRequest) returns (GetLatestReadinessResponse);

  rpc CreateMigrationPlan (CreateMigrationPlanRequest) returns (CreateMigrationPlanResponse);
  rpc ListMigrationPlans (ListMigrationPlansRequest) returns (ListMigrationPlansResponse);
  rpc GetMigrationPlan (GetMigrationPlanRequest) returns (GetMigrationPlanResponse);
  rpc ExecuteMigrationPlan (ExecuteMigrationPlanRequest) returns (ExecuteMigrationPlanResponse);
  rpc RollbackMigrationPlan (RollbackMigrationPlanRequest) returns (RollbackMigrationPlanResponse);
  rpc ListMigrationRuns (ListMigrationRunsRequest) returns (ListMigrationRunsResponse);

  rpc GetTimeline (GetTimelineRequest) returns (GetTimelineResponse);
  rpc ExportCBOM (ExportCBOMRequest) returns (ExportCBOMResponse);
}

message JsonObject {
  map<string, string> fields = 1;
}

message AssetRisk {
  string asset_id = 1;
  string asset_type = 2;
  string name = 3;
  string source = 4;
  string algorithm = 5;
  string classification = 6;
  double qsl_score = 7;
  string migration_target = 8;
  int32 priority = 9;
  string reason = 10;
}

message ReadinessScan {
  string id = 1;
  string tenant_id = 2;
  string status = 3;
  int32 total_assets = 4;
  int32 pqc_ready_assets = 5;
  int32 hybrid_assets = 6;
  int32 classical_assets = 7;
  double average_qsl = 8;
  int32 readiness_score = 9;
  map<string, int32> algorithm_summary = 10;
  map<string, string> timeline_status = 11;
  repeated AssetRisk risk_items = 12;
  map<string, string> metadata = 13;
  string created_at = 14;
  string completed_at = 15;
}

message MigrationStep {
  string id = 1;
  string asset_id = 2;
  string asset_type = 3;
  string name = 4;
  string current_algorithm = 5;
  string target_algorithm = 6;
  string phase = 7;
  int32 priority = 8;
  string status = 9;
  string reason = 10;
  map<string, string> metadata = 11;
  string executed_at = 12;
  string rolled_back_at = 13;
}

message MigrationPlan {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string status = 4;
  string target_profile = 5;
  string timeline_standard = 6;
  string deadline = 7;
  map<string, string> summary = 8;
  repeated MigrationStep steps = 9;
  string created_by = 10;
  string created_at = 11;
  string updated_at = 12;
  string executed_at = 13;
}

message MigrationRun {
  string id = 1;
  string tenant_id = 2;
  string plan_id = 3;
  string status = 4;
  bool dry_run = 5;
  map<string, string> summary = 6;
  string created_at = 7;
  string completed_at = 8;
}

message TimelineMilestone {
  string id = 1;
  string standard = 2;
  string title = 3;
  string due_date = 4;
  string status = 5;
  int32 days_left = 6;
  string description = 7;
}

message StartReadinessScanRequest {
  string tenant_id = 1;
  string trigger = 2;
}

message StartReadinessScanResponse {
  ReadinessScan scan = 1;
}

message ListReadinessScansRequest {
  string tenant_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListReadinessScansResponse {
  repeated ReadinessScan items = 1;
}

message GetReadinessScanRequest {
  string tenant_id = 1;
  string id = 2;
}

message GetReadinessScanResponse {
  ReadinessScan scan = 1;
}

message GetLatestReadinessRequest {
  string tenant_id = 1;
}

message GetLatestReadinessResponse {
  ReadinessScan readiness = 1;
}

message CreateMigrationPlanRequest {
  string tenant_id = 1;
  string name = 2;
  string target_profile = 3;
  string timeline_standard = 4;
  string deadline = 5;
  string created_by = 6;
}

message CreateMigrationPlanResponse {
  MigrationPlan plan = 1;
}

message ListMigrationPlansRequest {
  string tenant_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListMigrationPlansResponse {
  repeated MigrationPlan items = 1;
}

message GetMigrationPlanRequest {
  string tenant_id = 1;
  string id = 2;
}

message GetMigrationPlanResponse {
  MigrationPlan plan = 1;
}

message ExecuteMigrationPlanRequest {
  string tenant_id = 1;
  string id = 2;
  bool dry_run = 3;
  string actor = 4;
}

message ExecuteMigrationPlanResponse {
  MigrationRun run = 1;
}

message RollbackMigrationPlanRequest {
  string tenant_id = 1;
  string id = 2;
  string actor = 3;
}

message RollbackMigrationPlanResponse {
  MigrationPlan plan = 1;
}

message ListMigrationRunsRequest {
  string tenant_id = 1;
  string plan_id = 2;
}

message ListMigrationRunsResponse {
  repeated MigrationRun items = 1;
}

message GetTimelineRequest {
  string tenant_id = 1;
}

message GetTimelineResponse {
  ReadinessScan readiness = 1;
  repeated TimelineMilestone milestones = 2;
}

message ExportCBOMRequest {
  string tenant_id = 1;
}

message ExportCBOMResponse {
  JsonObject document = 1;
}
