syntax = "proto3";

package vecta.secrets.v1;

option go_package = "vecta-kms/proto/secrets;secretspb";

service SecretsService {
  rpc CreateSecret (CreateSecretRequest) returns (CreateSecretResponse);
  rpc ListSecrets (ListSecretsRequest) returns (ListSecretsResponse);
  rpc GetSecret (GetSecretRequest) returns (GetSecretResponse);
  rpc GetSecretValue (GetSecretValueRequest) returns (GetSecretValueResponse);
  rpc UpdateSecret (UpdateSecretRequest) returns (UpdateSecretResponse);
  rpc DeleteSecret (DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc GenerateSSHKey (GenerateSSHKeyRequest) returns (GenerateSSHKeyResponse);
}

message Secret {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string secret_type = 4;
  string description = 5;
  map<string, string> labels = 6;
  string status = 7;
  int64 lease_ttl_seconds = 8;
  string expires_at = 9;
  int32 current_version = 10;
  string created_at = 11;
  string updated_at = 12;
}

message CreateSecretRequest {
  string tenant_id = 1;
  string name = 2;
  string secret_type = 3;
  string value = 4;
  string description = 5;
  map<string, string> labels = 6;
  string metadata_json = 7;
  int64 lease_ttl_seconds = 8;
  string created_by = 9;
}

message CreateSecretResponse {
  Secret secret = 1;
}

message ListSecretsRequest {
  string tenant_id = 1;
  string secret_type = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListSecretsResponse {
  repeated Secret items = 1;
}

message GetSecretRequest {
  string tenant_id = 1;
  string secret_id = 2;
}

message GetSecretResponse {
  Secret secret = 1;
}

message GetSecretValueRequest {
  string tenant_id = 1;
  string secret_id = 2;
  string format = 3;
}

message GetSecretValueResponse {
  string value = 1;
  string content_type = 2;
  string format = 3;
}

message UpdateSecretRequest {
  string tenant_id = 1;
  string secret_id = 2;
  string name = 3;
  string description = 4;
  map<string, string> labels = 5;
  string metadata_json = 6;
  int64 lease_ttl_seconds = 7;
  string value = 8;
  string updated_by = 9;
}

message UpdateSecretResponse {
  Secret secret = 1;
}

message DeleteSecretRequest {
  string tenant_id = 1;
  string secret_id = 2;
}

message DeleteSecretResponse {
  string status = 1;
}

message GenerateSSHKeyRequest {
  string tenant_id = 1;
  string name = 2;
  string description = 3;
  map<string, string> labels = 4;
  int64 lease_ttl_seconds = 5;
  string created_by = 6;
}

message GenerateSSHKeyResponse {
  Secret secret = 1;
  string public_key = 2;
}
