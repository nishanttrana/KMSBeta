# pg_hba.conf — Vecta KMS hardened configuration
# Authentication method: scram-sha-256 everywhere (replaces md5).
# SCRAM-SHA-256 is salted, iterated, and channel-binding-capable — it does not
# transmit passwords in cleartext and resists offline dictionary attacks.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket — used by pg_isready health-check inside the container.
local   all             all                                     scram-sha-256

# IPv4 connections — only from inside the kms_net Docker network (172.18/16).
# All service containers connect via the kms_net bridge; reject anything else.
host    all             all             172.16.0.0/12           scram-sha-256

# IPv6 localhost — disabled; kms_net uses IPv4 only.
# host  all             all             ::1/128                 reject

# Catch-all: reject all other connections.
host    all             all             0.0.0.0/0               reject
