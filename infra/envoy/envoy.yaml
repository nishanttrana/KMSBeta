static_resources:
  listeners:
  - name: http_redirect
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: edge_http_redirect
          route_config:
            name: redirect_all
            virtual_hosts:
            - name: redirect_host
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                redirect:
                  https_redirect: true
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  - name: https_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 443
    filter_chains:
    - transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain:
                filename: /etc/envoy/certs/tls.crt
              private_key:
                filename: /etc/envoy/certs/tls.key
      filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: edge_https
          use_remote_address: true
          normalize_path: true
          route_config:
            name: kms_routes
            virtual_hosts:
            - name: kms_api
              domains: ["*"]
              routes:
              - match: { prefix: "/api/auth" }
                route: { cluster: auth_http, timeout: 30s, prefix_rewrite: "/" }
                typed_per_filter_config:
                  envoy.filters.http.local_ratelimit:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                    stat_prefix: auth_local_rate_limit
                    token_bucket: { max_tokens: 150, tokens_per_fill: 150, fill_interval: 1s }
              - match:
                  path: "/api/keycore"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: keycore_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/keycore"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: keycore_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/audit"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: audit_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/policy"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: policy_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/secrets"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: secrets_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/certs"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: certs_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/governance"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: governance_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/cloud"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: cloud_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/hyok"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: hyok_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/kmip"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: kmip_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/qkd"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: qkd_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/ekm"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: ekm_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/payment"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: payment_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/compliance"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: compliance_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/sbom"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: sbom_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/cbom"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: sbom_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/reporting"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: reporting_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/ai"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: ai_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/pqc"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: pqc_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/discovery"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: discovery_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/mpc"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: mpc_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/dataprotect"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: dataprotect_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/cluster"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: cluster_http, timeout: 60s, prefix_rewrite: "/" }
              - match:
                  prefix: "/api/software-vault"
                  headers: [{ name: "x-tenant-id", present_match: true }]
                route: { cluster: software_vault_http, timeout: 60s, prefix_rewrite: "/" }
              - match: { prefix: "/healthz" }
                route: { cluster: auth_http, timeout: 10s, prefix_rewrite: "/healthz" }
              - match: { prefix: "/api" }
                direct_response:
                  status: 400
                  body:
                    inline_string: '{"error":{"code":"MISSING_TENANT","message":"x-tenant-id header is required"}}'
              - match: { prefix: "/" }
                direct_response:
                  status: 200
                  body:
                    inline_string: "Vecta KMS Envoy edge is running"
          http_filters:
          - name: envoy.filters.http.local_ratelimit
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
              stat_prefix: tenant_local_rate_limit
              token_bucket:
                max_tokens: 300
                tokens_per_fill: 300
                fill_interval: 1s
              filter_enabled:
                runtime_key: local_rate_limit_enabled
                default_value: { numerator: 100, denominator: HUNDRED }
              filter_enforced:
                runtime_key: local_rate_limit_enforced
                default_value: { numerator: 100, denominator: HUNDRED }
              response_headers_to_add:
              - append: false
                header: { key: "x-rate-limited-by", value: "envoy-local" }
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  - name: kmip_tcp_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 5696
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: kmip_tcp
          cluster: kmip_tcp

  clusters:
  - name: auth_http
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: auth_http
      endpoints: [{ lb_endpoints: [{ endpoint: { address: { socket_address: { address: auth, port_value: 8001 }}}}]}]
