apiVersion: kms.vecta.io/v1
kind: DeploymentConfig
metadata:
    appliance_id: kms-dev-01
    created_at: "2026-02-19T16:06:36Z"
spec:
    core:
        audit: true
        auth: true
        keycore: true
        policy: true
    features:
        ai_llm: false
        certs: true
        cloud_byok: false
        clustering: false
        compliance_dashboard: true
        crypto_discovery: false
        data_protection: true
        ekm_database: false
        governance: true
        hyok_proxy: false
        kmip_server: true
        mpc_engine: false
        posture_management: true
        payment_crypto: true
        autokey_provisioning: true
        workload_identity: true
        confidential_compute: true
        pqc_migration: true
        qkd_interface: false
        qrng_generator: false
        reporting_alerting: true
        sbom_cbom: true
        secrets: true
    hsm_mode: software
    cert_security:
        cert_storage_mode: db_encrypted
        root_key_mode: software
        sealed_key_path: /var/lib/vecta/certs/crwk.sealed
        passphrase_file_path: /etc/vecta/certs-bootstrap.secret
        use_tpm_seal: false
        acme_renewal:
            enable_ari: true
            ari_poll_hours: 24
            ari_window_bias_percent: 35
            emergency_rotation_threshold_hours: 48
            mass_renewal_risk_threshold: 8
    license:
        activated_at: "2026-02-19T16:06:36Z"
        features_allowed:
            - '*'
        key: SEC-KMS-ENT-2026-ABCD
        max_keys: 5000000
        max_tenants: 50
        status: active
