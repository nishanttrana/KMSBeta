name: vecta-kms

x-kms-common-env: &kms-common-env
  POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/vecta?sslmode=disable
  SQLITE_FALLBACK: "false"
  NATS_URL: nats://nats:4222
  CONSUL_HTTP_ADDR: consul:8500
  CONSUL_SERVICE_ADDRESS: $$HOSTNAME
  CONSUL_HEALTH_CHECK_TYPE: tcp
  REDIS_URL: redis://valkey:6379
  DB_MAX_OPEN: "25"
  DB_MAX_IDLE: "10"
  RATE_LIMIT_RPS: "100"
  RATE_LIMIT_BURST: "200"
  WORKLOAD_IDENTITY_SHARED_SECRET: ${WORKLOAD_IDENTITY_SHARED_SECRET:-change-me-workload-secret}

x-kms-service: &kms-service
  restart: unless-stopped
  networks:
    - kms_net
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 48M
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    restart: unless-stopped
    image: postgres:16.13-alpine
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-256MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE:-768MB}
      - -c
      - work_mem=${PG_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${PG_MAINT_MEM:-64MB}
      - -c
      - max_connections=${PG_MAX_CONN:-200}
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - max_wal_size=${PG_MAX_WAL:-1GB}
      - -c
      - log_min_duration_statement=200
    shm_size: '256m'
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: vecta
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vecta"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - kms_net

  pgbouncer:
    restart: unless-stopped
    profiles: ["connection_pooling"]
    image: edoburu/pgbouncer:1.23.0
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vecta
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      LISTEN_PORT: 6432
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    networks:
      - kms_net

  nats:
    restart: unless-stopped
    profiles: ["event_streaming"]
    image: nats:2.12.4-alpine
    volumes:
      - ./infra/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - kms_net

  valkey:
    restart: unless-stopped
    profiles: ["distributed_cache"]
    image: valkey/valkey:9.0.3-alpine
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    volumes:
      - ./infra/valkey/valkey.conf:/etc/valkey/valkey.conf:ro
      - valkey-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - kms_net

  consul:
    restart: unless-stopped
    profiles: ["service_discovery"]
    image: hashicorp/consul:1.21.5
    command: ["agent", "-server", "-bootstrap-expect=1", "-client=0.0.0.0", "-ui", "-config-file=/consul/config/consul.hcl"]
    ports:
      - "8500:8500"
      - "8502:8502"
      - "8600:8600/udp"
    volumes:
      - ./infra/consul:/consul/config
      - consul-data:/consul/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8500/v1/status/leader | grep -q ':'"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - kms_net

  etcd:
    restart: unless-stopped
    image: quay.io/coreos/etcd:v3.6.8
    command:
      - etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --log-format=json
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    profiles: ["clustering"]
    networks:
      - kms_net

  envoy:
    restart: unless-stopped
    image: envoyproxy/envoy:v1.37.1
    user: root
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - for i in $(seq 1 120); do [ -s /run/vecta/runtime-certs/envoy/tls.crt ] && [ -s /run/vecta/runtime-certs/envoy/tls.key ] && [ -s /run/vecta/runtime-certs/ca/ca.crt ] && break; sleep 1; done; mkdir -p /tmp/envoy-certs; cp /run/vecta/runtime-certs/envoy/tls.crt /tmp/envoy-certs/tls.crt; cp /run/vecta/runtime-certs/envoy/tls.key /tmp/envoy-certs/tls.key; cp /run/vecta/runtime-certs/ca/ca.crt /tmp/envoy-certs/ca.crt; chmod 0644 /tmp/envoy-certs/tls.crt; chmod 0644 /tmp/envoy-certs/tls.key; chmod 0644 /tmp/envoy-certs/ca.crt; exec /usr/local/bin/envoy -c /etc/envoy/envoy.yaml --service-cluster vecta-edge
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - runtime-certs:/run/vecta/runtime-certs:ro
    ports:
      - "80:80"
      - "443:443"
      - "5696:5696"
      - "9901:9901"
    depends_on:
      certs:
        condition: service_healthy
      auth:
        condition: service_started
      keycore:
        condition: service_started
    healthcheck:
      test: ["CMD", "/usr/local/bin/envoy", "--version"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - kms_net

  dashboard:
    restart: unless-stopped
    build:
      context: ./web/dashboard
      dockerfile: Dockerfile
    image: vecta/dashboard:latest
    ports:
      - "5173:5173"
    depends_on:
      auth:
        condition: service_healthy
      keycore:
        condition: service_healthy
      audit:
        condition: service_healthy
      policy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5173 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - kms_net

  auth:
    <<: *kms-service
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    image: vecta/auth:latest
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    environment:
      <<: *kms-common-env
      HTTP_PORT: "8001"
      GRPC_PORT: "18001"
      JWT_PRIVATE_KEY_PATH: /var/lib/vecta/auth/jwt_private.pem
      SYSTEM_SERVICE_RESTART_ENABLED: ${SYSTEM_SERVICE_RESTART_ENABLED:-true}
      AUTH_BOOTSTRAP_TENANT_ID: ${AUTH_BOOTSTRAP_TENANT_ID:-root}
      AUTH_BOOTSTRAP_TENANT_NAME: ${AUTH_BOOTSTRAP_TENANT_NAME:-Root}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-VectaAdmin@2026}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-admin@vecta.local}
      AUTH_BOOTSTRAP_ADMIN_ROLE: ${AUTH_BOOTSTRAP_ADMIN_ROLE:-tenant-admin}
      AUTH_BOOTSTRAP_FORCE_PASSWORD_CHANGE: ${AUTH_BOOTSTRAP_FORCE_PASSWORD_CHANGE:-true}
      AUTH_BOOTSTRAP_CLI_ENABLED: ${AUTH_BOOTSTRAP_CLI_ENABLED:-true}
      AUTH_BOOTSTRAP_CLI_USERNAME: ${AUTH_BOOTSTRAP_CLI_USERNAME:-cli-user}
      AUTH_BOOTSTRAP_CLI_PASSWORD: ${AUTH_BOOTSTRAP_CLI_PASSWORD:-VectaCLI@2026}
      AUTH_BOOTSTRAP_CLI_EMAIL: ${AUTH_BOOTSTRAP_CLI_EMAIL:-cli@vecta.local}
      AUTH_CLI_HOST: ${AUTH_CLI_HOST:-127.0.0.1}
      AUTH_CLI_PORT: ${AUTH_CLI_PORT:-2222}
      AUTH_CLI_HSM_WORKSPACE_ROOT: ${AUTH_CLI_HSM_WORKSPACE_ROOT:-/var/lib/vecta/hsm/providers}
      AUTH_CLI_HSM_SERVICE_NAME: ${AUTH_CLI_HSM_SERVICE_NAME:-hsm-integration}
    volumes:
      - auth-data:/var/lib/vecta/auth
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8001:8001"
      - "18001:18001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18001"]
      interval: 15s
      timeout: 5s
      retries: 10

  hsm-integration:
    restart: unless-stopped
    profiles: ["hsm_cli"]
    build:
      context: .
      dockerfile: services/hsm-integration/Dockerfile
    image: vecta/hsm-integration:latest
    environment:
      HSM_INTEGRATION_USER: ${AUTH_BOOTSTRAP_CLI_USERNAME:-cli-user}
      HSM_INTEGRATION_WORKSPACE_ROOT: ${AUTH_CLI_HSM_WORKSPACE_ROOT:-/var/lib/vecta/hsm/providers}
    ports:
      - "2222:22"
    volumes:
      - hsm-integration-data:/var/lib/vecta/hsm
    healthcheck:
      test: ["CMD-SHELL", "netstat -ltn | grep -q ':22[[:space:]]'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - kms_net

  keycore:
    <<: *kms-service
    build:
      context: .
      dockerfile: services/keycore/Dockerfile
    image: vecta/keycore:latest
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    environment:
      <<: *kms-common-env
      HSM_MODE: ${HSM_MODE:-software}
      HSM_ENDPOINT: ${HSM_ENDPOINT:-hsm-connector:18430}
      GOVERNANCE_URL: http://governance:8050
      CLUSTER_URL: ${CLUSTER_URL:-http://cluster-manager:8210}
      CLUSTER_BOOTSTRAP_PROFILE_ID: ${CLUSTER_BOOTSTRAP_PROFILE_ID:-cluster-profile-base}
      CLUSTER_NODE_ID: ${CLUSTER_NODE_ID:-vecta-kms-01}
      CLUSTER_SYNC_SHARED_SECRET: ${CLUSTER_SYNC_SHARED_SECRET:-}
      CLUSTER_HSM_PARTITION_LABEL: ${CLUSTER_HSM_PARTITION_LABEL:-}
      CLUSTER_HSM_KEY_REPLICATION_ENABLED: ${CLUSTER_HSM_KEY_REPLICATION_ENABLED:-false}
      KEYCORE_MEK_IN_HSM: ${KEYCORE_MEK_IN_HSM:-false}
      KEYCORE_MEK_LOGICAL_ID: ${KEYCORE_MEK_LOGICAL_ID:-}
      CLUSTER_SYNC_TLS_CA_FILE: ${CLUSTER_SYNC_TLS_CA_FILE:-}
      CLUSTER_SYNC_TLS_CERT_FILE: ${CLUSTER_SYNC_TLS_CERT_FILE:-}
      CLUSTER_SYNC_TLS_KEY_FILE: ${CLUSTER_SYNC_TLS_KEY_FILE:-}
      CLUSTER_SYNC_TLS_SERVER_NAME: ${CLUSTER_SYNC_TLS_SERVER_NAME:-}
      CLUSTER_SYNC_TLS_INSECURE_SKIP_VERIFY: ${CLUSTER_SYNC_TLS_INSECURE_SKIP_VERIFY:-false}
      HTTP_PORT: "8010"
      GRPC_PORT: "18010"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8010:8010"
      - "18010:18010"
    volumes:
      - keycore-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18010"]
      interval: 15s
      timeout: 5s
      retries: 10

  audit:
    <<: *kms-service
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    image: vecta/audit:latest
    environment:
      <<: *kms-common-env
      CLUSTER_URL: ${CLUSTER_URL:-http://cluster-manager:8210}
      CLUSTER_BOOTSTRAP_PROFILE_ID: ${CLUSTER_BOOTSTRAP_PROFILE_ID:-cluster-profile-base}
      CLUSTER_NODE_ID: ${CLUSTER_NODE_ID:-vecta-kms-01}
      CLUSTER_SYNC_SHARED_SECRET: ${CLUSTER_SYNC_SHARED_SECRET:-}
      CLUSTER_SYNC_TLS_CA_FILE: ${CLUSTER_SYNC_TLS_CA_FILE:-}
      CLUSTER_SYNC_TLS_CERT_FILE: ${CLUSTER_SYNC_TLS_CERT_FILE:-}
      CLUSTER_SYNC_TLS_KEY_FILE: ${CLUSTER_SYNC_TLS_KEY_FILE:-}
      CLUSTER_SYNC_TLS_SERVER_NAME: ${CLUSTER_SYNC_TLS_SERVER_NAME:-}
      CLUSTER_SYNC_TLS_INSECURE_SKIP_VERIFY: ${CLUSTER_SYNC_TLS_INSECURE_SKIP_VERIFY:-false}
      HTTP_PORT: "8070"
      GRPC_PORT: "18070"
    ports:
      - "8070:8070"
      - "18070:18070"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18070"]
      interval: 15s
      timeout: 5s
      retries: 10

  policy:
    <<: *kms-service
    build:
      context: .
      dockerfile: services/policy/Dockerfile
    image: vecta/policy:latest
    environment:
      <<: *kms-common-env
      CLUSTER_URL: ${CLUSTER_URL:-http://cluster-manager:8210}
      CLUSTER_BOOTSTRAP_PROFILE_ID: ${CLUSTER_BOOTSTRAP_PROFILE_ID:-cluster-profile-base}
      CLUSTER_NODE_ID: ${CLUSTER_NODE_ID:-vecta-kms-01}
      CLUSTER_SYNC_SHARED_SECRET: ${CLUSTER_SYNC_SHARED_SECRET:-}
      CLUSTER_SYNC_TLS_CA_FILE: ${CLUSTER_SYNC_TLS_CA_FILE:-}
      CLUSTER_SYNC_TLS_CERT_FILE: ${CLUSTER_SYNC_TLS_CERT_FILE:-}
      CLUSTER_SYNC_TLS_KEY_FILE: ${CLUSTER_SYNC_TLS_KEY_FILE:-}
      CLUSTER_SYNC_TLS_SERVER_NAME: ${CLUSTER_SYNC_TLS_SERVER_NAME:-}
      CLUSTER_SYNC_TLS_INSECURE_SKIP_VERIFY: ${CLUSTER_SYNC_TLS_INSECURE_SKIP_VERIFY:-false}
      HTTP_PORT: "8040"
      GRPC_PORT: "18040"
    ports:
      - "8040:8040"
      - "18040:18040"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18040"]
      interval: 15s
      timeout: 5s
      retries: 10

  secrets:
    <<: *kms-service
    profiles: ["secrets"]
    build:
      context: .
      dockerfile: services/secrets/Dockerfile
    image: vecta/secrets:latest
    environment:
      <<: *kms-common-env
      HTTP_PORT: "8020"
      GRPC_PORT: "18020"
    ports:
      - "8020:8020"
      - "18020:18020"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18020"]
      interval: 15s
      timeout: 5s
      retries: 10

  certs:
    <<: *kms-service
    profiles: ["certs"]
    build:
      context: .
      dockerfile: services/certs/Dockerfile
    image: vecta/certs:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      CERTS_STORAGE_MODE: ${CERTS_STORAGE_MODE:-db_encrypted}
      CERTS_ROOT_KEY_MODE: ${CERTS_ROOT_KEY_MODE:-software}
      CERTS_CRWK_SEALED_PATH: ${CERTS_CRWK_SEALED_PATH:-/var/lib/vecta/certs/crwk.sealed}
      CERTS_CRWK_BOOTSTRAP_PASSPHRASE: ${CERTS_CRWK_BOOTSTRAP_PASSPHRASE:-}
      CERTS_CRWK_PASSPHRASE_FILE: ${CERTS_CRWK_PASSPHRASE_FILE:-/var/lib/vecta/certs/bootstrap.passphrase}
      CERTS_CRWK_ARGON_MEMORY_KB: ${CERTS_CRWK_ARGON_MEMORY_KB:-131072}
      CERTS_CRWK_ARGON_ITERATIONS: ${CERTS_CRWK_ARGON_ITERATIONS:-4}
      CERTS_CRWK_ARGON_PARALLEL: ${CERTS_CRWK_ARGON_PARALLEL:-2}
      CERTS_CRWK_MLOCK_REQUIRED: ${CERTS_CRWK_MLOCK_REQUIRED:-false}
      CERTS_CRWK_USE_TPM_SEAL: ${CERTS_CRWK_USE_TPM_SEAL:-false}
      CERTS_RUNTIME_MATERIALIZER_ENABLED: ${CERTS_RUNTIME_MATERIALIZER_ENABLED:-true}
      CERTS_RUNTIME_MATERIALIZER_DIR: ${CERTS_RUNTIME_MATERIALIZER_DIR:-/run/vecta/certs}
      CERTS_RUNTIME_MATERIALIZER_INTERVAL: ${CERTS_RUNTIME_MATERIALIZER_INTERVAL:-5m}
      CERTS_RUNTIME_MATERIALIZER_RENEW_BEFORE: ${CERTS_RUNTIME_MATERIALIZER_RENEW_BEFORE:-24h}
      CERTS_RUNTIME_TENANT_ID: ${CERTS_RUNTIME_TENANT_ID:-root}
      CERTS_RUNTIME_ROOT_CA_NAME: ${CERTS_RUNTIME_ROOT_CA_NAME:-vecta-runtime-root}
      CERTS_RUNTIME_VALIDITY_DAYS: ${CERTS_RUNTIME_VALIDITY_DAYS:-90}
      CERTS_RUNTIME_ENVOY_CN: ${CERTS_RUNTIME_ENVOY_CN:-vecta-envoy}
      CERTS_RUNTIME_ENVOY_SANS: ${CERTS_RUNTIME_ENVOY_SANS:-localhost,envoy,127.0.0.1}
      CERTS_RUNTIME_KMIP_CN: ${CERTS_RUNTIME_KMIP_CN:-vecta-kmip}
      CERTS_RUNTIME_KMIP_SANS: ${CERTS_RUNTIME_KMIP_SANS:-localhost,kmip,127.0.0.1}
      HTTP_PORT: "8030"
      GRPC_PORT: "18030"
    volumes:
      - certs-key-data:/var/lib/vecta/certs
      - runtime-certs:/run/vecta/certs
    ports:
      - "8030:8030"
      - "18030:18030"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18030 && test -s /run/vecta/certs/envoy/tls.crt && test -s /run/vecta/certs/envoy/tls.key && test -s /run/vecta/certs/kmip/tls.crt && test -s /run/vecta/certs/kmip/tls.key && test -s /run/vecta/certs/ca/ca.crt"]
      interval: 15s
      timeout: 5s
      retries: 10

  governance:
    <<: *kms-service
    profiles: ["governance"]
    build:
      context: .
      dockerfile: services/governance/Dockerfile
    image: vecta/governance:latest
    environment:
      <<: *kms-common-env
      APP_BASE_URL: https://localhost
      CERTS_URL: http://certs:8030
      HTTP_PORT: "8050"
      GRPC_PORT: "18050"
    ports:
      - "8050:8050"
      - "18050:18050"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18050"]
      interval: 15s
      timeout: 5s
      retries: 10

  cloud:
    <<: *kms-service
    profiles: ["cloud_byok"]
    build:
      context: .
      dockerfile: services/cloud/Dockerfile
    image: vecta/cloud:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      HTTP_PORT: "8080"
      GRPC_PORT: "18080"
    ports:
      - "8080:8080"
      - "18080:18080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18080"]
      interval: 15s
      timeout: 5s
      retries: 10

  hyok:
    <<: *kms-service
    profiles: ["hyok_proxy"]
    build:
      context: .
      dockerfile: services/hyok/Dockerfile
    image: vecta/hyok:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      POLICY_URL: http://policy:8040
      GOVERNANCE_URL: http://governance:8050
      HTTP_PORT: "8120"
      GRPC_PORT: "18120"
    ports:
      - "8120:8120"
      - "18120:18120"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18120"]
      interval: 15s
      timeout: 5s
      retries: 10

  kmip:
    <<: *kms-service
    profiles: ["kmip_server"]
    build:
      context: .
      dockerfile: services/kmip/Dockerfile
    image: vecta/kmip:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      CERTS_URL: http://certs:8030
      HTTP_PORT: "8160"
      KMIP_PORT: "5696"
      GRPC_PORT: "15696"
      KMIP_REQUIRE_REGISTERED_CLIENT: ${KMIP_REQUIRE_REGISTERED_CLIENT:-true}
      KMIP_TLS_CERT_FILE: /etc/vecta-certs/kmip/tls.crt
      KMIP_TLS_KEY_FILE: /etc/vecta-certs/kmip/tls.key
      KMIP_TLS_CLIENT_CA_FILE: /etc/vecta-certs/ca/ca.crt
    volumes:
      - runtime-certs:/etc/vecta-certs:ro
    ports:
      - "8160:8160"
      - "15696:15696"
    expose:
      - "5696"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 15696"]
      interval: 15s
      timeout: 5s
      retries: 10

  qkd:
    <<: *kms-service
    profiles: ["qkd_interface"]
    build:
      context: .
      dockerfile: services/qkd/Dockerfile
    image: vecta/qkd:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      HTTP_PORT: "8150"
      GRPC_PORT: "18150"
    ports:
      - "8150:8150"
      - "18150:18150"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18150"]
      interval: 15s
      timeout: 5s
      retries: 10

  qrng:
    <<: *kms-service
    profiles: ["qrng_generator"]
    build:
      context: .
      dockerfile: services/qrng/Dockerfile
    image: vecta/qrng:latest
    environment:
