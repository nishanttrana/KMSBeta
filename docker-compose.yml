      GRPC_PORT: "18060"
    ports:
      - "8060:8060"
      - "18060:18060"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18060"]
      interval: 15s
      timeout: 5s
      retries: 10

  discovery:
    <<: *kms-service
    profiles: ["crypto_discovery"]
    build:
      context: .
      dockerfile: services/discovery/Dockerfile
    image: vecta/discovery:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
