    image: vecta/mpc:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      CLUSTER_URL: http://cluster-manager:8210
      HTTP_PORT: "8190"
      GRPC_PORT: "18190"
    ports:
      - "8190:8190"
      - "18190:18190"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18190"]
      interval: 15s
      timeout: 5s
      retries: 10

  dataprotect:
    <<: *kms-service
    profiles: ["data_protection"]
    build:
      context: .
      dockerfile: services/dataprotect/Dockerfile
    image: vecta/dataprotect:latest
    environment:
      <<: *kms-common-env
      KEYCORE_URL: http://keycore:8010
      HTTP_PORT: "8200"
      GRPC_PORT: "18200"
    ports:
      - "8200:8200"
      - "18200:18200"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18200"]
      interval: 15s
      timeout: 5s
      retries: 10

  cluster-manager:
    <<: *kms-service
    profiles: ["clustering"]
    image: vecta/cluster:latest
    environment:
      <<: *kms-common-env
      HTTP_PORT: "8210"
      GRPC_PORT: "18210"
    ports:
      - "8210:8210"
      - "18210:18210"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18210"]
      interval: 15s
      timeout: 5s
      retries: 10

  hsm-connector:
    <<: *kms-service
    profiles: ["hsm_hardware"]
    image: vecta/hsm-connector:latest
    environment:
      <<: *kms-common-env
      HTTP_PORT: "8430"
      GRPC_PORT: "18430"
    ports:
      - "8430:8430"
      - "18430:18430"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18430"]
      interval: 15s
      timeout: 5s
      retries: 10

  software-vault:
    <<: *kms-service
    profiles: ["hsm_software"]
    build:
      context: .
      dockerfile: services/software-vault/Dockerfile
    image: vecta/software-vault:latest
    environment:
      <<: *kms-common-env
      HSM_PROVIDER: ${HSM_PROVIDER:-software}
      SOFTWARE_VAULT_PASSPHRASE: ${SOFTWARE_VAULT_PASSPHRASE:-vecta-dev-passphrase}
      SOFTWARE_VAULT_MLOCK_REQUIRED: ${SOFTWARE_VAULT_MLOCK_REQUIRED:-false}
      THALES_ENDPOINT: ${THALES_ENDPOINT:-}
      THALES_PARTITION: ${THALES_PARTITION:-}
      THALES_SLOT_LABEL: ${THALES_SLOT_LABEL:-}
      VECTA_ENDPOINT: ${VECTA_ENDPOINT:-}
      VECTA_PROJECT_ID: ${VECTA_PROJECT_ID:-}
      VECTA_KEY_DOMAIN: ${VECTA_KEY_DOMAIN:-}
      HTTP_PORT: "8440"
      GRPC_PORT: "18440"
    ports:
      - "8440:8440"
      - "18440:18440"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 18440"]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  kms_net:
    driver: bridge

volumes:
  postgres-data:
  consul-data:
  auth-data:
  keycore-data:
  certs-key-data:
  runtime-certs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=32m,mode=0700,uid=100,gid=101"
