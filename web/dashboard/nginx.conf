server {
  listen 5173;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # Avoid stale SPA shell after redeploys.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Keep assets non-cached in this environment to avoid stale-bundle UI regressions.
  location /assets/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Static assets + SPA fallback.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  # Auth API
  location /auth {
    set $auth_upstream http://auth:8001;
    proxy_pass $auth_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Service APIs mirroring the Vite dev proxy rules.
  location ~ ^/svc/keycore(?<rest>/.*)$ { set $svc_keycore http://keycore:8010$rest$is_args$args; proxy_pass $svc_keycore; }
  location ~ ^/svc/secrets(?<rest>/.*)$ { set $svc_secrets http://secrets:8020$rest$is_args$args; proxy_pass $svc_secrets; }
  location ~ ^/svc/certs(?<rest>/.*)$ { set $svc_certs http://certs:8030$rest$is_args$args; proxy_pass $svc_certs; }
  location ~ ^/svc/policy(?<rest>/.*)$ { set $svc_policy http://policy:8040$rest$is_args$args; proxy_pass $svc_policy; }
  location ~ ^/svc/governance(?<rest>/.*)$ { set $svc_governance http://governance:8050$rest$is_args$args; proxy_pass $svc_governance; }
  location ~ ^/svc/pqc(?<rest>/.*)$ { set $svc_pqc http://pqc:8060$rest$is_args$args; proxy_pass $svc_pqc; }
  location ~ ^/svc/audit(?<rest>/.*)$ { set $svc_audit http://audit:8070$rest$is_args$args; proxy_pass $svc_audit; }
  location ~ ^/svc/cloud(?<rest>/.*)$ { set $svc_cloud http://cloud:8080$rest$is_args$args; proxy_pass $svc_cloud; }
  location ~ ^/svc/compliance(?<rest>/.*)$ { set $svc_compliance http://compliance:8110$rest$is_args$args; proxy_pass $svc_compliance; }
  location ~ ^/svc/hyok(?<rest>/.*)$ { set $svc_hyok http://hyok:8120$rest$is_args$args; proxy_pass $svc_hyok; }
  location ~ ^/svc/ekm(?<rest>/.*)$ { set $svc_ekm http://ekm:8130$rest$is_args$args; proxy_pass $svc_ekm; }
  location ~ ^/svc/kmip(?<rest>/.*)$ { set $svc_kmip http://kmip:8160$rest$is_args$args; proxy_pass $svc_kmip; }
  location ~ ^/svc/reporting(?<rest>/.*)$ { set $svc_reporting http://reporting:8140$rest$is_args$args; proxy_pass $svc_reporting; }
  location ~ ^/svc/posture(?<rest>/.*)$ { set $svc_posture http://posture:8220$rest$is_args$args; proxy_pass $svc_posture; }
  location ~ ^/svc/ai(?<rest>/.*)$ { set $svc_ai http://ai:8090$rest$is_args$args; proxy_pass $svc_ai; }
  location ~ ^/svc/qkd(?<rest>/.*)$ { set $svc_qkd http://qkd:8150$rest$is_args$args; proxy_pass $svc_qkd; }
  location ~ ^/svc/qrng(?<rest>/.*)$ { set $svc_qrng http://qrng:8230$rest$is_args$args; proxy_pass $svc_qrng; }
  location ~ ^/svc/payment(?<rest>/.*)$ { set $svc_payment http://payment:8170$rest$is_args$args; proxy_pass $svc_payment; }
  location ~ ^/svc/sbom(?<rest>/.*)$ { set $svc_sbom http://sbom:8180$rest$is_args$args; proxy_pass $svc_sbom; }
  location ~ ^/svc/dataprotect(?<rest>/.*)$ { set $svc_dataprotect http://dataprotect:8200$rest$is_args$args; proxy_pass $svc_dataprotect; }
  location ~ ^/svc/mpc(?<rest>/.*)$ { set $svc_mpc http://mpc:8190$rest$is_args$args; proxy_pass $svc_mpc; }
  location ~ ^/svc/cluster(?<rest>/.*)$ { set $svc_cluster http://cluster-manager:8210$rest$is_args$args; proxy_pass $svc_cluster; }
  location ~ ^/svc/firstboot(?<rest>/.*)$ { set $svc_firstboot http://firstboot:9443$rest$is_args$args; proxy_pass $svc_firstboot; }
  location ~ ^/svc/software-vault(?<rest>/.*)$ { set $svc_software_vault http://software-vault:8440$rest$is_args$args; proxy_pass $svc_software_vault; }
  location ~ ^/svc/auth(?<rest>/.*)$ { set $svc_auth http://auth:8001$rest$is_args$args; proxy_pass $svc_auth; }

  # Edge/API route via Envoy TLS endpoint.
  location /api {
    set $envoy_upstream https://envoy:443;
    proxy_pass $envoy_upstream;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
