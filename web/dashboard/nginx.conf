# ── Rate-limit zones (http context — conf.d/*.conf is included inside http{}) ─
# auth: 10 req/s per IP with a burst of 20 (login brute-force mitigation)
# api:  50 req/s per IP with a burst of 100 (general API DoS protection)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=50r/s;

server {
  listen 5173;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # ── Hide Nginx version from Server header and error pages ─────────────────
  server_tokens off;

  # ── Connection performance ────────────────────────────────────────────────
  keepalive_timeout 65;
  tcp_nopush  on;
  tcp_nodelay on;

  # ── Request limits (DoS / large-payload protection) ──────────────────────
  client_max_body_size     4m;    # reject bodies > 4 MB before they hit upstream
  client_body_timeout      15s;   # kill slow-upload connections
  client_header_timeout    15s;   # kill slow-header connections
  send_timeout             30s;

  # ── Proxy timeouts (prevent upstream hangs blocking Nginx workers) ────────
  proxy_connect_timeout    10s;
  proxy_send_timeout       30s;
  proxy_read_timeout       30s;

  # ── Gzip compression ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    font/woff2;

  # ── Security headers (applied to all responses) ──────────────────────────
  add_header X-Frame-Options                    "DENY"                                            always;
  add_header X-Content-Type-Options             "nosniff"                                         always;
  add_header Referrer-Policy                    "strict-origin-when-cross-origin"                 always;
  add_header Permissions-Policy                 "camera=(), microphone=(), geolocation=(), payment=()" always;
  # Isolate this browsing context from other origins (clickjacking + Spectre)
  add_header Cross-Origin-Opener-Policy         "same-origin"                                     always;
  # Prevent other origins from loading our resources into their context
  add_header Cross-Origin-Resource-Policy       "same-origin"                                     always;
  # Embed policy: only allow embedding from same origin
  add_header Cross-Origin-Embedder-Policy       "require-corp"                                    always;
  # CSP: self-only; wasm-unsafe-eval for crypto modules; ws/wss for live feed
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none';"
    always;

  # ── index.html — never cache ──────────────────────────────────────────────
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header X-Frame-Options                    "DENY"                                            always;
    add_header X-Content-Type-Options             "nosniff"                                         always;
    add_header Referrer-Policy                    "strict-origin-when-cross-origin"                 always;
    add_header Permissions-Policy                 "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy         "same-origin"                                     always;
    add_header Cross-Origin-Resource-Policy       "same-origin"                                     always;
    add_header Cross-Origin-Embedder-Policy       "require-corp"                                    always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none';"
      always;
    expires -1;
    try_files $uri =404;
  }

  # ── Hashed assets — immutable cache ──────────────────────────────────────
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header X-Frame-Options                    "DENY"                                            always;
    add_header X-Content-Type-Options             "nosniff"                                         always;
    add_header Referrer-Policy                    "strict-origin-when-cross-origin"                 always;
    add_header Permissions-Policy                 "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy         "same-origin"                                     always;
    add_header Cross-Origin-Resource-Policy       "same-origin"                                     always;
    add_header Cross-Origin-Embedder-Policy       "require-corp"                                    always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data: blob:; font-src 'self' data:; frame-ancestors 'none';"
      always;
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  # ── Auth API — tighter body limit and proxy hardening ────────────────────
  location /auth {
    # Login payloads are tiny — reject anything suspicious
    client_max_body_size 32k;
    # Brute-force protection: 10 req/s, burst 20, no-delay enforces hard cap
    limit_req zone=auth_limit burst=20 nodelay;
    limit_req_status 429;
    set $auth_upstream http://auth:8001;
    proxy_pass $auth_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Don't forward internal headers that could be spoofed by clients
    proxy_set_header X-Real-IP         $remote_addr;
  }

  # ── Service APIs ──────────────────────────────────────────────────────────
  location ~ ^/svc/keycore(?<rest>/.*)$        { set $svc http://keycore:8010$rest$is_args$args;           proxy_pass $svc; }
  location ~ ^/svc/secrets(?<rest>/.*)$        { set $svc http://secrets:8020$rest$is_args$args;           proxy_pass $svc; }
  location ~ ^/svc/certs(?<rest>/.*)$          { set $svc http://certs:8030$rest$is_args$args;             proxy_pass $svc; }
  location ~ ^/svc/policy(?<rest>/.*)$         { set $svc http://policy:8040$rest$is_args$args;            proxy_pass $svc; }
  location ~ ^/svc/governance(?<rest>/.*)$     { set $svc http://governance:8050$rest$is_args$args;        proxy_pass $svc; }
  location ~ ^/svc/pqc(?<rest>/.*)$            { set $svc http://pqc:8060$rest$is_args$args;               proxy_pass $svc; }
  location ~ ^/svc/audit(?<rest>/.*)$          { set $svc http://audit:8070$rest$is_args$args;             proxy_pass $svc; }
  location ~ ^/svc/cloud(?<rest>/.*)$          { set $svc http://cloud:8080$rest$is_args$args;             proxy_pass $svc; }
  location ~ ^/svc/compliance(?<rest>/.*)$     { set $svc http://compliance:8110$rest$is_args$args;        proxy_pass $svc; }
  location ~ ^/svc/hyok(?<rest>/.*)$           { set $svc http://hyok:8120$rest$is_args$args;              proxy_pass $svc; }
  location ~ ^/svc/ekm(?<rest>/.*)$            { set $svc http://ekm:8130$rest$is_args$args;               proxy_pass $svc; }
  location ~ ^/svc/kmip(?<rest>/.*)$           { set $svc http://kmip:8160$rest$is_args$args;              proxy_pass $svc; }
  location ~ ^/svc/reporting(?<rest>/.*)$      { set $svc http://reporting:8140$rest$is_args$args;         proxy_pass $svc; }
  location ~ ^/svc/posture(?<rest>/.*)$        { set $svc http://posture:8220$rest$is_args$args;           proxy_pass $svc; }
  location ~ ^/svc/ai(?<rest>/.*)$             { set $svc http://ai:8090$rest$is_args$args;                proxy_pass $svc; }
  location ~ ^/svc/qkd(?<rest>/.*)$            { set $svc http://qkd:8150$rest$is_args$args;               proxy_pass $svc; }
  location ~ ^/svc/qrng(?<rest>/.*)$           { set $svc http://qrng:8230$rest$is_args$args;              proxy_pass $svc; }
  location ~ ^/svc/payment(?<rest>/.*)$        { set $svc http://payment:8170$rest$is_args$args;           proxy_pass $svc; }
  location ~ ^/svc/confidential(?<rest>/.*)$   { set $svc http://confidential:8240$rest$is_args$args;      proxy_pass $svc; }
  location ~ ^/svc/workload(?<rest>/.*)$       { set $svc http://workload:8250$rest$is_args$args;          proxy_pass $svc; }
  location ~ ^/svc/autokey(?<rest>/.*)$        { set $svc http://autokey:8260$rest$is_args$args;           proxy_pass $svc; }
  location ~ ^/svc/signing(?<rest>/.*)$        { set $svc http://signing:8280$rest$is_args$args;           proxy_pass $svc; }
  location ~ ^/svc/keyaccess(?<rest>/.*)$      { set $svc http://keyaccess:8270$rest$is_args$args;         proxy_pass $svc; }
  location ~ ^/svc/sbom(?<rest>/.*)$           { set $svc http://sbom:8180$rest$is_args$args;              proxy_pass $svc; }
  location ~ ^/svc/dataprotect(?<rest>/.*)$    { set $svc http://dataprotect:8200$rest$is_args$args;       proxy_pass $svc; }
  location ~ ^/svc/mpc(?<rest>/.*)$            { set $svc http://mpc:8190$rest$is_args$args;               proxy_pass $svc; }
  location ~ ^/svc/cluster(?<rest>/.*)$        { set $svc http://cluster-manager:8210$rest$is_args$args;   proxy_pass $svc; }
  location ~ ^/svc/software-vault(?<rest>/.*)$ { set $svc http://software-vault:8440$rest$is_args$args;    proxy_pass $svc; }
  location ~ ^/svc/auth(?<rest>/.*)$           { set $svc http://auth:8001$rest$is_args$args;              proxy_pass $svc; }

  # ── Edge/API route via Envoy TLS endpoint ─────────────────────────────────
  location /api {
    # General API DoS protection: 50 req/s, burst 100
    limit_req zone=api_limit burst=100 nodelay;
    limit_req_status 429;
    set $envoy_upstream https://envoy:443;
    proxy_pass $envoy_upstream;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
