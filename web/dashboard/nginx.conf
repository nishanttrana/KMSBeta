server {
  listen 5173;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Avoid stale SPA shell after redeploys.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Keep assets non-cached in this environment to avoid stale-bundle UI regressions.
  location /assets/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Static assets + SPA fallback.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  # Auth API
  location /auth {
    proxy_pass http://auth:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Service APIs mirroring the Vite dev proxy rules.
  location /svc/keycore/ { proxy_pass http://keycore:8010/; }
  location /svc/secrets/ { proxy_pass http://secrets:8020/; }
  location /svc/certs/ { proxy_pass http://certs:8030/; }
  location /svc/policy/ { proxy_pass http://policy:8040/; }
  location /svc/governance/ { proxy_pass http://governance:8050/; }
  location /svc/pqc/ { proxy_pass http://pqc:8060/; }
  location /svc/audit/ { proxy_pass http://audit:8070/; }
  location /svc/cloud/ { proxy_pass http://cloud:8080/; }
  location /svc/compliance/ { proxy_pass http://compliance:8110/; }
  location /svc/hyok/ { proxy_pass http://hyok:8120/; }
  location /svc/ekm/ { proxy_pass http://ekm:8130/; }
  location /svc/kmip/ { proxy_pass http://kmip:8160/; }
  location /svc/reporting/ { proxy_pass http://reporting:8140/; }
  location /svc/posture/ { proxy_pass http://posture:8220/; }
  location /svc/ai/ { proxy_pass http://ai:8090/; }
  location /svc/qkd/ { proxy_pass http://qkd:8150/; }
  location /svc/qrng/ { proxy_pass http://qrng:8230/; }
  location /svc/payment/ { proxy_pass http://payment:8170/; }
  location /svc/sbom/ { proxy_pass http://sbom:8180/; }
  location /svc/dataprotect/ { proxy_pass http://dataprotect:8200/; }
  location /svc/mpc/ { proxy_pass http://mpc:8190/; }
  location /svc/cluster/ { proxy_pass http://cluster-manager:8210/; }
  location /svc/firstboot/ { proxy_pass http://firstboot:9443/; }
  location /svc/software-vault/ { proxy_pass http://software-vault:8440/; }
  location /svc/auth/ { proxy_pass http://auth:8001/; }

  # Edge/API route via Envoy TLS endpoint.
  location /api {
    proxy_pass https://envoy:443;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
