server {
  listen 5173;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # Avoid stale SPA shell after redeploys.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Keep assets non-cached in this environment to avoid stale-bundle UI regressions.
  location /assets/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Static assets + SPA fallback.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    expires -1;
    try_files $uri $uri/ /index.html;
  }

  # Auth API
  location /auth {
    set $auth_upstream http://auth:8001;
    proxy_pass $auth_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Service APIs mirroring the Vite dev proxy rules.
  location /svc/keycore/ { set $svc_keycore http://keycore:8010/; proxy_pass $svc_keycore; }
  location /svc/secrets/ { set $svc_secrets http://secrets:8020/; proxy_pass $svc_secrets; }
  location /svc/certs/ { set $svc_certs http://certs:8030/; proxy_pass $svc_certs; }
  location /svc/policy/ { set $svc_policy http://policy:8040/; proxy_pass $svc_policy; }
  location /svc/governance/ { set $svc_governance http://governance:8050/; proxy_pass $svc_governance; }
  location /svc/pqc/ { set $svc_pqc http://pqc:8060/; proxy_pass $svc_pqc; }
  location /svc/audit/ { set $svc_audit http://audit:8070/; proxy_pass $svc_audit; }
  location /svc/cloud/ { set $svc_cloud http://cloud:8080/; proxy_pass $svc_cloud; }
  location /svc/compliance/ { set $svc_compliance http://compliance:8110/; proxy_pass $svc_compliance; }
  location /svc/hyok/ { set $svc_hyok http://hyok:8120/; proxy_pass $svc_hyok; }
  location /svc/ekm/ { set $svc_ekm http://ekm:8130/; proxy_pass $svc_ekm; }
  location /svc/kmip/ { set $svc_kmip http://kmip:8160/; proxy_pass $svc_kmip; }
  location /svc/reporting/ { set $svc_reporting http://reporting:8140/; proxy_pass $svc_reporting; }
  location /svc/posture/ { set $svc_posture http://posture:8220/; proxy_pass $svc_posture; }
  location /svc/ai/ { set $svc_ai http://ai:8090/; proxy_pass $svc_ai; }
  location /svc/qkd/ { set $svc_qkd http://qkd:8150/; proxy_pass $svc_qkd; }
  location /svc/qrng/ { set $svc_qrng http://qrng:8230/; proxy_pass $svc_qrng; }
  location /svc/payment/ { set $svc_payment http://payment:8170/; proxy_pass $svc_payment; }
  location /svc/sbom/ { set $svc_sbom http://sbom:8180/; proxy_pass $svc_sbom; }
  location /svc/dataprotect/ { set $svc_dataprotect http://dataprotect:8200/; proxy_pass $svc_dataprotect; }
  location /svc/mpc/ { set $svc_mpc http://mpc:8190/; proxy_pass $svc_mpc; }
  location /svc/cluster/ { set $svc_cluster http://cluster-manager:8210/; proxy_pass $svc_cluster; }
  location /svc/firstboot/ { set $svc_firstboot http://firstboot:9443/; proxy_pass $svc_firstboot; }
  location /svc/software-vault/ { set $svc_software_vault http://software-vault:8440/; proxy_pass $svc_software_vault; }
  location /svc/auth/ { set $svc_auth http://auth:8001/; proxy_pass $svc_auth; }

  # Edge/API route via Envoy TLS endpoint.
  location /api {
    set $envoy_upstream https://envoy:443;
    proxy_pass $envoy_upstream;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
