name: CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  dashboard-quality:
    name: Dashboard Lint/Type/Unit/Build/Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate REST catalog
        run: npm run generate:rest-catalog

      - name: Lint
        run: npm run lint

      - name: Component size gate
        run: npm run check:component-size

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Security scan (npm audit)
        run: npm audit --omit=dev --audit-level=high

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npm run test:smoke

  backend-quality:
    name: Backend RuntimeCfg/Vet/Test/Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Runtime config validation gate
        run: |
          chmod +x infra/scripts/check-runtimecfg.sh
          infra/scripts/check-runtimecfg.sh

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: govulncheck ./...
